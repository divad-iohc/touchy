name: Pull Request Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Prepare Build Metadata
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            archive_name="Touchy-pr-${{ github.event.pull_request.number }}-macOS"
            version="0.0.0-pr.${{ github.event.pull_request.number }}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            archive_name="Touchy-main-${GITHUB_RUN_NUMBER}-macOS"
            version="0.0.0-main.${GITHUB_RUN_NUMBER}"
          else
            archive_name="Touchy-manual-${GITHUB_RUN_NUMBER}-macOS"
            version="0.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi

          echo "TOUCHY_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "TOUCHY_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"
          echo "ARCHIVE_NAME=${archive_name}" >> "${GITHUB_ENV}"

      - name: Package macOS App
        run: zsh mac-app/scripts/package-release.sh "${ARCHIVE_NAME}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            mac-app/dist/${{ env.ARCHIVE_NAME }}.zip
            mac-app/dist/${{ env.ARCHIVE_NAME }}.zip.sha256
          if-no-files-found: error
          compression-level: 0
